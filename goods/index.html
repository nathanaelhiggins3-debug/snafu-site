<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SNAFU — Goods</title>
  <meta name="description" content="SNAFU original production. In-house drops, forged and hoarded.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/goods.css">
</head>
<body>

  <a class="back" href="/" aria-label="Back to home">&larr; BACK</a>

  <section class="arrival" aria-label="Vault threshold">
    <div class="arrival-bg" role="img" aria-label="Stone archway opening onto a hoard of gold"></div>
    <h1 class="wordmark">GOODS</h1>
    <div class="cue">
      <span>ENTER</span>
      <div class="cue-arrow">&darr;</div>
    </div>
  </section>

  <section class="chamber" aria-label="Vault interior">
    <div class="chamber-bg" aria-hidden="true"></div>
    <div class="chamber-veil" aria-hidden="true"></div>

    <header class="chamber-head">
      <p class="eyebrow">SNAFU ORIGINAL PRODUCTION</p>
      <h2 class="chamber-title">THE HOARD</h2>
      <p class="chamber-sub">In-house drops. Made, not found.</p>
    </header>

    <div id="relics" class="relics" aria-live="polite"></div>

    <p id="empty" class="empty" hidden>The hoard is quiet. Check back on the next drop.</p>
  </section>

  <footer class="colophon">
    <p>SNAFU &mdash; forged, not found.</p>
    <p><a href="/shop/">Looking for one-offs? &rarr; Shop the archive</a></p>
  </footer>

  <script src="/js/goods-data.js" defer></script>
  <script src="/js/goods.js" defer></script>
  <script src="/js/site.js" defer></script>
</body>
</html>
