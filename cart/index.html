<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>SNAFU. — Cart</title>
  <meta name="description" content="Your SNAFU cart." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/styles.css?v=10" />

  <script defer src="https://analytics.snafu.quest/script.js" data-website-id="664fa64b-2817-4e3f-9304-bb448b8d09cd"></script>
</head>
<body>

  <section class="page-head wrap">
    <h1 class="page-head__title">Cart</h1>
    <a class="backlink" href="../shop/">&larr; Back to the Shop</a>
  </section>

  <section class="wrap">
    <div id="cart-root"></div>
  </section>

  <script src="../js/cart.js"></script>
  <script>
    (function () {
      var root = document.getElementById("cart-root");

      function money(n) {
        return "$" + n.toLocaleString("en-US", { maximumFractionDigits: 2 });
      }

      function render() {
        var items = window.SNAFU_CART.read();

        if (!items.length) {
          root.innerHTML =
            '<div class="cart-empty">' +
              '<p class="cart-empty__title">Your cart is empty</p>' +
              '<p class="code">Nothing claimed yet — the Shop is one-of-one, so move quick.</p>' +
              '<a class="btn btn--ghost" href="../shop/">Browse the Shop</a>' +
            '</div>';
          return;
        }

        var rows = items.map(function (it) {
          var line = window.SNAFU_CART.priceToNumber(it.price) * (it.qty || 1);
          return (
            '<div class="cart-row">' +
              '<div class="cart-row__thumb"><span class="product__id">' + it.id + '</span></div>' +
              '<div class="cart-row__info">' +
                '<h2 class="cart-row__title">' + it.title + '</h2>' +
                '<div class="cart-row__brand code">' + (it.brand || "") + '</div>' +
              '</div>' +
              '<div class="cart-row__qty code">Qty ' + (it.qty || 1) + '</div>' +
              '<div class="cart-row__price">' + money(line) + '</div>' +
              '<button class="cart-row__remove" type="button" data-remove="' + it.id + '">Remove</button>' +
            '</div>'
          );
        }).join("");

        root.innerHTML =
          '<div class="cart-list">' + rows + '</div>' +
          '<div class="cart-foot">' +
            '<div class="cart-foot__sub">' +
              '<span class="code">Subtotal</span>' +
              '<span class="cart-foot__total">' + money(window.SNAFU_CART.subtotal()) + '</span>' +
            '</div>' +
            '<button class="btn" type="button" id="checkout-btn">Checkout</button>' +
            '<p class="code cart-foot__note" id="checkout-note">Secure payment via Stripe (test mode). Test card: 4242 4242 4242 4242, any future date / CVC.</p>' +
          '</div>';
      }

      // Send the cart to the Netlify function, then redirect to Stripe.
      function startCheckout() {
        var items = window.SNAFU_CART.read().map(function (i) {
          return { id: i.id, qty: i.qty || 1 };
        });
        if (!items.length) return;
        var btn = document.getElementById("checkout-btn");
        var note = document.getElementById("checkout-note");
        btn.disabled = true;
        btn.textContent = "Redirecting…";
        fetch("/.netlify/functions/create-checkout-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ items: items })
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (res) {
            if (res.ok && res.data && res.data.url) {
              window.location.href = res.data.url; // Stripe-hosted checkout
            } else {
              throw new Error((res.data && res.data.error) || "Checkout failed.");
            }
          })
          .catch(function (err) {
            btn.disabled = false;
            btn.innerHTML = "Checkout";
            note.textContent = "Couldn't start checkout: " + err.message +
              "  (Checkout needs `netlify dev` locally or a deploy — the plain python server has no functions.)";
            note.style.color = "var(--red)";
          });
      }

      // Event-delegated clicks (work after every re-render).
      root.addEventListener("click", function (e) {
        if (e.target.closest("#checkout-btn")) { startCheckout(); return; }
        var rm = e.target.closest("[data-remove]");
        if (!rm) return;
        window.SNAFU_CART.remove(rm.getAttribute("data-remove"));
        render();
      });

      // Re-render if the cart changes elsewhere (e.g. another tab).
      window.addEventListener("snafu:cart", render);

      render();
    })();
  </script>
  <script src="../js/site.js"></script>
</body>
</html>
