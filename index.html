<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SNAFU</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   SNAFU — title screen
   Static. No build step. Save as index.html.
   Needs: assets/forest.png
   ============================================================ */

:root {
  /* sampled directly from assets/forest.png */
  --cream: #f2e4c4;   /* brightest ray, lifted to hold as text */
  --ink:   #0c1412;   /* deepest canopy shadow */
  --gold:  #e3aa4d;   /* lantern light */
  --moss:  #3f4726;   /* undergrowth */
  --red:   #b8352b;   /* not in the forest — which is why it's the accent */
  --px: 3px;

  --display: 'Press Start 2P', monospace;
  --body: 'Pixelify Sans', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  color: var(--cream);
  font-family: var(--body);
}

/* ---------- FOREST ---------- */
.forest {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(180deg, #151f19 0%, #1d3126 45%, #422b1e 100%);
}
.forest img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  image-rendering: pixelated;
  display: block;
}
/* Darkens the edges so the wordmark holds the middle. */
.forest::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 45%, transparent 0%, rgba(10,8,5,.6) 100%),
    linear-gradient(180deg, rgba(10,8,5,.4) 0%, transparent 30%, transparent 65%, rgba(10,8,5,.75) 100%);
  pointer-events: none;
}

/* ---------- TITLE SCREEN ---------- */
.title-screen {
  position: relative;
  z-index: 1;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 6vh 20px;
}

.wordmark {
  font-family: var(--display);
  font-size: clamp(38px, 11vw, 130px);
  line-height: 1;
  letter-spacing: .02em;
  color: var(--cream);
  /* Hard stepped shadows, zero blur. Blur reads as vector; stacked
     offsets read as sprite. */
  text-shadow:
    var(--px) var(--px) 0 var(--red),
    calc(var(--px)*2) calc(var(--px)*2) 0 var(--ink),
    calc(var(--px)*3) calc(var(--px)*3) 0 var(--ink),
    calc(var(--px)*5) calc(var(--px)*6) 0 rgba(10,8,5,.45);
  animation: drop .6s steps(4) both;
}

.pron {
  font-family: var(--body);
  margin-top: calc(var(--px)*8);
  font-size: clamp(13px, 1.8vw, 20px);
  letter-spacing: .18em;
  color: var(--gold);
  text-shadow: 0 var(--px) 0 rgba(10,8,5,.9);
}

.definition {
  font-family: var(--body);
  margin-top: calc(var(--px)*4);
  max-width: 44ch;
  font-size: clamp(15px, 1.9vw, 22px);
  line-height: 1.5;
  text-shadow: 0 var(--px) 0 rgba(10,8,5,.95);
}

.start {
  font-family: var(--display);
  margin-top: calc(var(--px)*14);
  background: none;
  border: none;
  color: var(--cream);
  font-size: clamp(9px, 1.1vw, 13px);
  letter-spacing: .1em;
  cursor: pointer;
  padding: calc(var(--px)*2) calc(var(--px)*4);
  text-shadow: var(--px) var(--px) 0 var(--ink);
  animation: blink 1.1s steps(1, end) infinite;
}
.start:focus-visible { outline: var(--px) solid var(--gold); outline-offset: var(--px); }

@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:.2} }
@keyframes drop {
  from { transform: translateY(calc(var(--px)*-6)); opacity: 0; }
  to   { transform: none; opacity: 1; }
}

/* ---------- INDEX ---------- */
.index {
  position: relative;
  z-index: 1;
  min-height: 100svh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10vh 20px;
}
.index-inner {
  width: min(820px, 100%);
  background: rgba(12, 10, 7, .85);
  border: var(--px) solid var(--cream);
  box-shadow: calc(var(--px)*2) calc(var(--px)*2) 0 rgba(10,8,5,.6);
  padding: clamp(22px, 4vw, 44px);
}
.index-label {
  font-family: var(--display);
  font-size: 10px;
  letter-spacing: .2em;
  color: var(--gold);
  border-bottom: var(--px) solid var(--moss);
  padding-bottom: calc(var(--px)*4);
  margin-bottom: calc(var(--px)*8);
}
.index-nav { list-style: none; display: grid; gap: calc(var(--px)*2); }
.index-nav a {
  font-family: var(--display);
  display: flex;
  align-items: center;
  gap: calc(var(--px)*4);
  text-decoration: none;
  color: var(--cream);
  font-size: clamp(14px, 2.4vw, 26px);
  padding: calc(var(--px)*3);
  transition: none; /* states snap. easing is the website tell. */
}
.index-nav a .blurb {
  font-family: var(--body);
  font-size: clamp(11px, 1.2vw, 14px);
  letter-spacing: .1em;
  color: var(--gold);
  opacity: 0;
}
.index-nav a::before {
  content: '\25B8';
  color: var(--red);
  opacity: 0;
}
.index-nav a:hover,
.index-nav a:focus-visible {
  background: var(--cream);
  color: var(--ink);
  outline: none;
}
.index-nav a:hover::before,
.index-nav a:focus-visible::before { opacity: 1; }
.index-nav a:hover .blurb,
.index-nav a:focus-visible .blurb { opacity: 1; color: var(--red); }

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  .wordmark, .start { animation: none; }
}
</style>
</head>
<body>

<div class="forest" aria-hidden="true">
  <img src="assets/forest.png" alt="">
</div>

<main class="title-screen">
  <h1 class="wordmark">SNAFU</h1>
  <p class="pron">/sna&#712;fo&#823;o&#823;/</p>
  <p class="definition">
    A confusing, muddled, or chaotic situation where things go wrong
    and nothing happens as planned.
  </p>
  <button class="start" id="start">Press any key to begin</button>
</main>

<section class="index" id="index">
  <div class="index-inner">
    <p class="index-label">Index</p>
    <ul class="index-nav">
      <li><a href="/news">News <span class="blurb">Dispatch</span></a></li>
      <li><a href="/gallery">Gallery <span class="blurb">Archive</span></a></li>
      <li><a href="/shop">Shop <span class="blurb">Drops</span></a></li>
      <li><a href="/goods">Goods <span class="blurb">Objects</span></a></li>
      <li><a href="/play">Play <span class="blurb">Misc</span></a></li>
    </ul>
  </div>
</section>

<script>
(function () {
  var index = document.getElementById('index');
  var start = document.getElementById('start');
  var used = false;

  function begin() {
    if (used) return;
    used = true;
    index.scrollIntoView({ behavior: 'smooth' });
    var first = index.querySelector('a');
    if (first) setTimeout(function () { first.focus(); }, 600);
  }

  start.addEventListener('click', begin);
  document.addEventListener('keydown', function (e) {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (window.scrollY > 40) return;
    begin();
  });
})();
</script>

</body>
</html>
