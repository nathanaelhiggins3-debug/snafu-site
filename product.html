<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SNAFU. — Piece</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --px: 3px;
  --cream: #f2e4c4; --ink: #0c1412; --wheat: #e8d29a;
  --red: #b8352b; --rose: #d96a5c; --gold: #e3aa4d;
  --moss: #6b8a3a; --loam: #8a5a2b;
  --display: 'Press Start 2P', monospace;
  --body: 'Pixelify Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--ink); color: var(--cream); font-family: var(--body); min-height: 100vh; }
img { image-rendering: pixelated; image-rendering: -moz-crisp-edges; }
a { color: inherit; }

.top {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px clamp(16px, 3vw, 32px);
  border-bottom: var(--px) solid var(--cream);
}
.top a {
  font-family: var(--display); font-size: clamp(10px, 1vw, 12px);
  letter-spacing: .18em; color: var(--cream); text-decoration: none;
  padding: calc(var(--px)*2) calc(var(--px)*3);
  border: var(--px) solid var(--cream);
  box-shadow: var(--px) var(--px) 0 rgba(2,2,0,.7);
}
.top .back::before { content: '\25C2  '; color: var(--rose); }
.top a:hover { background: var(--cream); color: var(--ink); }
.top .pack .count { display: inline-block; margin-left: 8px; background: var(--red); color: var(--cream); padding: 2px 6px; font-size: 10px; }
.top .pack.empty-pack .count { background: var(--loam); }

.piece {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(20px, 4vw, 60px);
  padding: clamp(24px, 4vw, 60px) clamp(16px, 3vw, 32px);
  max-width: 1200px;
  margin: 0 auto;
}
@media (max-width: 720px) { .piece { grid-template-columns: 1fr; } }

.hero-img {
  aspect-ratio: 1 / 1;
  background: var(--wheat);
  border: var(--px) solid var(--cream);
  box-shadow: var(--px) var(--px) 0 rgba(2,2,0,.7);
  display: grid; place-items: center;
  font-family: var(--display); font-size: 12px;
  color: var(--loam); letter-spacing: .12em;
  text-align: center; padding: 20px; overflow: hidden;
}
.hero-img img { width: 100%; height: 100%; object-fit: cover; }

.info { display: flex; flex-direction: column; gap: 20px; }
.info h1 {
  font-family: var(--display);
  font-size: clamp(18px, 2.6vw, 28px);
  line-height: 1.3; color: var(--wheat); letter-spacing: .04em;
}
.info .price {
  font-family: var(--display); font-size: 20px;
  color: var(--gold); letter-spacing: .1em;
}
.info .price.sold { color: var(--rose); }
.info .price.sold::before { content: 'SOLD  '; }

.meta {
  display: grid; grid-template-columns: auto 1fr;
  gap: 8px 16px;
  font-family: var(--body); font-size: 15px;
  padding: 16px;
  border: var(--px) solid var(--cream);
  background: rgba(242,228,196,.04);
}
.meta dt {
  font-family: var(--display); font-size: 10px;
  letter-spacing: .14em; color: var(--wheat);
  align-self: center;
}
.meta dd { color: var(--cream); }

.note {
  font-family: var(--body); font-size: 17px;
  line-height: 1.5; color: var(--cream);
  padding: 16px;
  border-left: var(--px) solid var(--moss);
  background: rgba(107,138,58,.08);
}
.note::before {
  content: 'THE SNAFU LINE';
  display: block;
  font-family: var(--display); font-size: 9px;
  letter-spacing: .18em; color: var(--moss);
  margin-bottom: 8px;
}

.actions { display: flex; gap: 12px; flex-wrap: wrap; }
.actions button {
  font-family: var(--display); font-size: 11px;
  letter-spacing: .16em; padding: 14px 20px;
  border: var(--px) solid var(--cream);
  cursor: pointer;
  box-shadow: var(--px) var(--px) 0 rgba(2,2,0,.7);
  transition: transform 80ms steps(2, end);
}
.actions button:hover { transform: translate(calc(var(--px)*-1), calc(var(--px)*-1)); }
.actions .buy { background: var(--moss); color: var(--ink); border-color: var(--moss); }
.actions .add { background: transparent; color: var(--cream); }
.actions button:disabled {
  opacity: .4; cursor: not-allowed; transform: none;
}

.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: var(--moss); color: var(--ink);
  border: var(--px) solid var(--ink);
  padding: 12px 18px;
  font-family: var(--display); font-size: 11px;
  letter-spacing: .16em;
  opacity: 0; pointer-events: none;
  transition: opacity 200ms steps(3, end);
  z-index: 30;
}
.toast.on { opacity: 1; }

.notfound {
  text-align: center; padding: 100px 20px;
  font-family: var(--display); font-size: 12px;
  color: var(--wheat); letter-spacing: .16em;
}

.colophon {
  border-top: var(--px) solid var(--cream);
  padding: 40px clamp(16px, 3vw, 32px);
  display: grid; gap: 8px;
  font-family: var(--body); font-size: 14px; color: var(--wheat);
}
.colophon .row1 { font-family: var(--display); font-size: 11px; letter-spacing: .18em; color: var(--cream); }
.colophon a { color: var(--gold); text-decoration: none; }
.colophon a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header class="top">
  <a class="back" href="shop.html">Back to the market</a>
  <a class="pack empty-pack" id="pack" href="cart.html">
    PACK <span class="count" id="packCount">0</span>
  </a>
</header>

<main id="main"></main>

<div class="toast" id="toast">ADDED TO PACK</div>

<footer class="colophon">
  <div class="row1">SNAFU. &nbsp;·&nbsp; SHOP &nbsp;·&nbsp; LOS ANGELES</div>
  <div>Situation Normal: All Fouled Up.</div>
  <div><a href="mailto:nate@snafu.quest">nate@snafu.quest</a></div>
</footer>

<script src="js/shop-data.js"></script>
<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
const product = (window.SNAFU_SHOP || []).find(p => p.id === id);
const main = document.getElementById('main');

if (!product) {
  main.innerHTML = `<div class="notfound">This piece isn't here.<br><br><a href="shop.html" style="color:var(--gold);text-decoration:underline">back to the market</a></div>`;
} else {
  main.innerHTML = `
    <article class="piece">
      <div class="hero-img">
        ${product.img ? `<img src="${product.img}" alt="${product.name}">` : product.name.toUpperCase()}
      </div>
      <div class="info">
        <h1>${product.name}</h1>
        <div class="price ${product.sold ? 'sold' : ''}">$${product.price}</div>

        <dl class="meta">
          <dt>Year</dt><dd>${product.year}</dd>
          <dt>Origin</dt><dd>${product.origin}</dd>
          <dt>Size</dt><dd>${product.size}</dd>
          <dt>Condition</dt><dd>${product.condition}</dd>
        </dl>

        ${product.note ? `<div class="note">${product.note}</div>` : ''}

        <div class="actions">
          <button class="buy" id="buyBtn" ${product.sold ? 'disabled' : ''}>
            ${product.sold ? 'SOLD' : 'BUY NOW'}
          </button>
          <button class="add" id="addBtn" ${product.sold ? 'disabled' : ''}>
            ADD TO PACK
          </button>
        </div>
      </div>
    </article>
  `;

  if (!product.sold) {
    document.getElementById('addBtn').addEventListener('click', () => {
      addToCart(product.id, 1);
      showToast('ADDED TO PACK');
    });
    document.getElementById('buyBtn').addEventListener('click', () => {
      addToCart(product.id, 1);
      location.href = '/checkout';
    });
  }
}

function addToCart(pid, qty) {
  const cart = JSON.parse(localStorage.getItem('snafu.cart') || '[]');
  const existing = cart.find(i => i.id === pid);
  if (existing) existing.qty = (existing.qty || 1) + qty;
  else cart.push({ id: pid, qty });
  localStorage.setItem('snafu.cart', JSON.stringify(cart));
  refreshPack();
}

function refreshPack() {
  const cart = JSON.parse(localStorage.getItem('snafu.cart') || '[]');
  const count = cart.reduce((n, i) => n + (i.qty || 1), 0);
  document.getElementById('packCount').textContent = count;
  document.getElementById('pack').classList.toggle('empty-pack', count === 0);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 1500);
}

refreshPack();
</script>
</body>
</html>
