<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNAFU. — Play</title>
  <meta name="description" content="SNAFU // PLAY — a block-snake game spelling SNAFU. Eat the stars, mind the walls." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/styles.css?v=6" />
</head>
<body>

  <section class="play wrap">
    <div class="play__head">
      <span class="play__title code">SNAFU // PLAY</span>
      <span class="play__score code" id="score">SCORE <b>0</b> &middot; HIGH <b>0</b></span>
    </div>

    <div class="play__stage">
      <canvas id="board" width="520" height="520"></canvas>
      <div class="play__overlay" id="overlay">PRESS W A S D TO START</div>
    </div>

    <p class="play__hint code">WASD or arrow keys to steer &middot; eat the stars &middot; don't hit the walls</p>
  </section>

  <!-- ===== THE GAME (vanilla JS, no libraries) ===== -->
  <script>
  (function () {
    var GRID = 20;            // 20 x 20 board
    var SIZE = 520;           // logical pixels (520 / 20 = 26px cells)
    var CELL = SIZE / GRID;   // 26
    var SPEED = 120;          // ms per step (medium)
    var WORD = "SNAFU";
    var COLORS = { S: "#CC2E1C", N: "#2E5BCC", A: "#E0A422", F: "#2E8C57", U: "#17130C" };

    var canvas = document.getElementById("board");
    var ctx = canvas.getContext("2d");
    var overlay = document.getElementById("overlay");
    var scoreEl = document.getElementById("score");

    // Crisp rendering on retina: scale the backing store, draw in logical px.
    var dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = SIZE * dpr;
    canvas.height = SIZE * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var snake, dir, nextDir, food, score, started, dead, timer;
    var high = parseInt(localStorage.getItem("snafu_snake_high") || "0", 10) || 0;

    function reset() {
      // Length 3 near center, head = S, facing right, but still until start.
      var c = Math.floor(GRID / 2);
      snake = [ { x: c, y: c }, { x: c - 1, y: c }, { x: c - 2, y: c } ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      started = false;
      dead = false;
      placeFood();
      updateScore();
      showOverlay("PRESS W A S D TO START", false);
      draw();
    }

    function placeFood() {
      var open = [];
      for (var x = 0; x < GRID; x++) {
        for (var y = 0; y < GRID; y++) {
          var onSnake = false;
          for (var i = 0; i < snake.length; i++) {
            if (snake[i].x === x && snake[i].y === y) { onSnake = true; break; }
          }
          if (!onSnake) open.push({ x: x, y: y });
        }
      }
      food = open.length ? open[Math.floor(Math.random() * open.length)] : null;
    }

    function updateScore() {
      scoreEl.innerHTML = "SCORE <b>" + score + "</b> &middot; HIGH <b>" + high + "</b>";
    }

    function setDir(d) {
      // Ignore a 180° reversal into the snake's own neck.
      if (snake.length > 1 && d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
    }

    function tick() {
      dir = nextDir;
      var nx = snake[0].x + dir.x;
      var ny = snake[0].y + dir.y;

      // Wall (edge of grid) = death.
      if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) return die();

      var willGrow = food && nx === food.x && ny === food.y;
      // When not growing, the tail vacates its cell this step, so it's safe.
      var body = willGrow ? snake : snake.slice(0, -1);
      for (var i = 0; i < body.length; i++) {
        if (body[i].x === nx && body[i].y === ny) return die();
      }

      snake.unshift({ x: nx, y: ny });
      if (willGrow) {
        score++;
        updateScore();
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function die() {
      if (timer) { clearInterval(timer); timer = null; }
      dead = true;
      started = false;
      if (score > high) {
        high = score;
        localStorage.setItem("snafu_snake_high", String(high));
        updateScore();
      }
      showOverlay("GAME OVER", true);
      // Hold ~1.2s, then auto-redirect to the News page (root-relative so it
      // works on the local server AND when deployed). No click needed.
      setTimeout(function () { window.location.href = "/news/"; }, 1200);
    }

    // ----- drawing -----
    function draw() {
      // Cream board + faint dot texture (matches the rest of the site).
      ctx.fillStyle = "#F1EAD8";
      ctx.fillRect(0, 0, SIZE, SIZE);
      ctx.fillStyle = "rgba(23,19,12,0.06)";
      for (var gx = 9; gx < SIZE; gx += 18) {
        for (var gy = 9; gy < SIZE; gy += 18) {
          ctx.beginPath();
          ctx.arc(gx, gy, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      if (food) drawStar(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL * 0.36);
      // Draw tail-first so the head block sits on top.
      for (var i = snake.length - 1; i >= 0; i--) {
        drawBlock(snake[i].x, snake[i].y, WORD.charAt(i % WORD.length));
      }
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawBlock(gx, gy, letter) {
      var pad = 2;
      var X = gx * CELL + pad, Y = gy * CELL + pad, S = CELL - pad * 2;
      roundRect(X, Y, S, S, 5);
      ctx.fillStyle = COLORS[letter];
      ctx.fill();
      // Beveled toy-block look: light top-left, dark bottom-right.
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,0.32)";
      ctx.beginPath();
      ctx.moveTo(X + 2, Y + S - 3); ctx.lineTo(X + 2, Y + 2); ctx.lineTo(X + S - 3, Y + 2);
      ctx.stroke();
      ctx.strokeStyle = "rgba(0,0,0,0.22)";
      ctx.beginPath();
      ctx.moveTo(X + S - 2, Y + 3); ctx.lineTo(X + S - 2, Y + S - 2); ctx.lineTo(X + 3, Y + S - 2);
      ctx.stroke();
      // Bold capital letter, cream so it reads on every block color.
      ctx.fillStyle = "#F1EAD8";
      ctx.font = "bold " + Math.round(S * 0.62) + "px Helvetica, Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(letter, X + S / 2, Y + S / 2 + 1);
    }

    function drawStar(cx, cy, outer) {
      var inner = outer * 0.45, spikes = 5;
      ctx.save();
      ctx.shadowColor = "rgba(224,164,34,0.75)";
      ctx.shadowBlur = 8;
      ctx.beginPath();
      for (var i = 0; i < spikes * 2; i++) {
        var rad = (i % 2 === 0) ? outer : inner;
        var a = (Math.PI / spikes) * i - Math.PI / 2;
        var px = cx + Math.cos(a) * rad, py = cy + Math.sin(a) * rad;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = "#E0A422";
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = "#17130C";
      ctx.stroke();
      ctx.restore();
    }

    // ----- overlays -----
    function showOverlay(text, isOver) {
      overlay.textContent = text;
      overlay.classList.remove("is-hidden");
      overlay.classList.toggle("is-over", !!isOver);
    }
    function hideOverlay() { overlay.classList.add("is-hidden"); }

    // ----- input: WASD (spec) + arrow keys (bonus) -----
    document.addEventListener("keydown", function (e) {
      var k = e.key.toLowerCase();
      var d = null;
      if (k === "w" || k === "arrowup") d = { x: 0, y: -1 };
      else if (k === "s" || k === "arrowdown") d = { x: 0, y: 1 };
      else if (k === "a" || k === "arrowleft") d = { x: -1, y: 0 };
      else if (k === "d" || k === "arrowright") d = { x: 1, y: 0 };
      if (!d) return;
      if (k.indexOf("arrow") === 0) e.preventDefault(); // stop page scroll
      if (dead) return;                                  // ignore during GAME OVER hold

      if (!started) {
        started = true;
        setDir(d);
        dir = nextDir;          // first move honors the chosen direction
        hideOverlay();
        timer = setInterval(tick, SPEED);
      } else {
        setDir(d);
      }
    });

    reset();
  })();
  </script>

  <script src="../js/site.js"></script>
</body>
</html>
