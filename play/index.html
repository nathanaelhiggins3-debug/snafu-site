<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SNAFU. &mdash; Play</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --px: 3px;
  --cream: #f2e4c4; --ink: #0c1412; --wheat: #e8d29a;
  --red: #b8352b; --rose: #d96a5c; --gold: #e3aa4d;
  --dust: #d4c896;
  /* play dialect */
  --canopy: #1a3a1e; --leaf: #3d7a3d; --moss: #6b8a3a;
  --bark: #4a3520; --amber: #d4a04c;
  --display: 'Press Start 2P', monospace;
  --body: 'Pixelify Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--ink); color: var(--cream); font-family: var(--body); }
img { image-rendering: pixelated; image-rendering: -moz-crisp-edges; }
a { color: inherit; text-decoration: none; }

.scene {
  position: fixed; inset: 0; z-index: 0;
  background: url('/assets/play-arrival.png') center / cover no-repeat, var(--canopy);
  image-rendering: pixelated;
}
.scene::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(12,20,18,0) 40%, rgba(12,20,18,.65) 100%);
  pointer-events: none;
}

.arrive {
  position: relative; z-index: 2; min-height: 100svh;
  display: grid; grid-template-rows: auto 1fr auto;
  padding: clamp(20px, 3vw, 32px);
}
.path-back {
  font-family: var(--display); font-size: 10px; color: var(--cream);
  align-self: start; justify-self: start;
  padding: calc(var(--px)*2) calc(var(--px)*3);
  background: rgba(12,20,18,.55); border: var(--px) solid var(--ink);
}
.path-back:hover { color: var(--amber); }

.title { align-self: center; justify-self: center; text-align: center; }
.title h1 {
  font-family: var(--display);
  font-size: clamp(40px, 12vw, 104px); line-height: 1;
  color: var(--wheat);
  text-shadow:
    calc(var(--px)*-1) 0 0 var(--ink), var(--px) 0 0 var(--ink),
    0 calc(var(--px)*-1) 0 var(--ink), 0 var(--px) 0 var(--ink),
    calc(var(--px)*2) calc(var(--px)*2) 0 var(--red),
    calc(var(--px)*5) calc(var(--px)*5) 0 rgba(12,20,18,.5);
  animation: markdrop .6s steps(4) both;
}
@keyframes markdrop {
  from { transform: translateY(-40px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.lede {
  display: block; margin-top: calc(var(--px)*5);
  font-family: var(--body); font-size: 16px; color: var(--dust);
}
.cue {
  align-self: end; justify-self: center;
  font-family: var(--display); font-size: 12px; color: var(--amber);
  animation: blink 1s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* game */
.game {
  position: relative; z-index: 2; background: var(--ink);
  min-height: 100svh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: calc(var(--px)*4); padding: calc(var(--px)*12) calc(var(--px)*4);
}
.board-wrap { width: min(92vw, 720px); display: flex; justify-content: center; }
#play-canvas {
  image-rendering: pixelated;
  border: var(--px) solid var(--bark);
  background: var(--canopy);
  touch-action: none; display: block;
}
.play-instructions {
  font-family: var(--display); font-size: 9px; color: var(--dust);
  text-align: center; letter-spacing: 1px;
}

/* on-screen controls (mobile only) */
.dpad {
  display: none;
  grid-template-columns: repeat(3, 64px);
  grid-template-rows: repeat(3, 64px);
  grid-template-areas:
    ".    up    ."
    "left .     right"
    ".    down  .";
  gap: calc(var(--px) * 2);
  margin-top: calc(var(--px) * 3);
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
.dpad-up { grid-area: up; }
.dpad-down { grid-area: down; }
.dpad-left { grid-area: left; }
.dpad-right { grid-area: right; }
.dbtn {
  position: relative;
  width: 64px; height: 64px;
  padding: 0; margin: 0;
  background: var(--leaf);
  border: var(--px) solid var(--bark);
  cursor: pointer;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
.dbtn:active { background: var(--moss); }
.dbtn::before {
  content: ''; position: absolute; left: 50%; top: 50%;
  width: 0; height: 0; transform: translate(-50%, -50%);
}
.dpad-up::before {
  border-left: 12px solid transparent; border-right: 12px solid transparent;
  border-bottom: 18px solid var(--cream);
}
.dpad-down::before {
  border-left: 12px solid transparent; border-right: 12px solid transparent;
  border-top: 18px solid var(--cream);
}
.dpad-left::before {
  border-top: 12px solid transparent; border-bottom: 12px solid transparent;
  border-right: 18px solid var(--cream);
}
.dpad-right::before {
  border-top: 12px solid transparent; border-bottom: 12px solid transparent;
  border-left: 18px solid var(--cream);
}
@media (hover: none) and (pointer: coarse) { .dpad { display: grid; } }
@media (max-width: 640px) { .dpad { display: grid; } }

.colophon {
  position: relative; z-index: 2; background: var(--ink);
  font-family: var(--body); font-size: 13px; color: var(--wheat);
  text-align: center; padding: calc(var(--px)*8) calc(var(--px)*4); opacity: .7;
}
</style>
</head>
<body>

<div class="scene"></div>

<section class="arrive">
  <a class="path-back" href="/">Back to the clearing</a>
  <div class="title">
    <h1>Play</h1>
    <span class="lede">Classic snake. Jungle floor. Local score only.</span>
  </div>
  <span class="cue">Enter</span>
</section>

<section class="game" id="game">
  <div class="board-wrap">
    <canvas id="play-canvas" width="640" height="480"></canvas>
  </div>
  <div class="play-instructions">ARROWS OR WASD &nbsp;&middot;&nbsp; P TO PAUSE</div>
  <div class="dpad" id="dpad" aria-hidden="true">
    <button class="dbtn dpad-up" data-dir="up" aria-label="Up"></button>
    <button class="dbtn dpad-left" data-dir="left" aria-label="Left"></button>
    <button class="dbtn dpad-right" data-dir="right" aria-label="Right"></button>
    <button class="dbtn dpad-down" data-dir="down" aria-label="Down"></button>
  </div>
</section>

<footer class="colophon">
  SNAFU &mdash; Situation Normal. One egg at a time. Don't bite yourself.
</footer>

<script src="/js/play.js" defer></script>
<script src="/js/site.js" defer></script>
</body>
</html>
